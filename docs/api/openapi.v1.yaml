openapi: 3.0.3
info:
  title: Visiorama Gallery API
  version: 1.1.0
  description: >-
    Read-only gallery API for album navigation, media metadata, streaming,
    thumbnails, scan orchestration, video transcode, image conversion, and map clustering.
servers:
  - url: http://localhost:8080

tags:
  - name: Albums
  - name: Media
  - name: Scans
  - name: Transcode
  - name: Map
  - name: Admin
  - name: Health

paths:

  # ─── Albums ───────────────────────────────────────────────────────────────

  /api/albums/root:
    get:
      tags: [Albums]
      summary: Get root album listing
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Root album payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/albums/by-path:
    get:
      tags: [Albums]
      summary: Resolve album by relative path
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Relative path under configured root (e.g. "Vacations/Italy2023")
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Album payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/albums/by-media-ids:
    post:
      tags: [Albums]
      summary: Resolve albums for a set of media IDs
      description: Returns a map of mediaId → album for the given IDs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                    format: int64
              required: [ids]
      responses:
        '200':
          description: Map of mediaId → AlbumTile
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/AlbumTile'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/albums/{albumId}:
    get:
      tags: [Albums]
      summary: Get album by ID
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Album payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/albums/{albumId}/gps-count:
    get:
      tags: [Albums]
      summary: Count media items with GPS coordinates in an album subtree
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      responses:
        '200':
          description: GPS media count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'

  # ─── Media ────────────────────────────────────────────────────────────────

  /api/media/{mediaId}/metadata:
    get:
      tags: [Media]
      summary: Get metadata for one media item
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: Media metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaMetadata'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/media/{mediaId}/thumbnail:
    get:
      tags: [Media]
      summary: Get media thumbnail or video poster frame
      parameters:
        - $ref: '#/components/parameters/MediaId'
        - name: size
          in: query
          required: false
          schema:
            type: integer
          description: Thumbnail width in pixels (uses nearest configured size)
      responses:
        '200':
          description: Thumbnail JPEG
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /api/media/{mediaId}/stream:
    get:
      tags: [Media]
      summary: Stream original media file
      description: >-
        Serves the original file. Supports HTTP Range requests (RFC 7233).
        Returns 206 for valid Range headers, 200 when no Range header is present.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: Full media stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content (Range request)
        '416':
          description: Range Not Satisfiable
        '404':
          $ref: '#/components/responses/NotFound'

  /api/media/{mediaId}/convert:
    get:
      tags: [Media]
      summary: On-demand image format conversion (HEIC/TIFF → JPEG)
      description: >-
        Converts the source image to JPEG on first request; subsequent requests
        return the cached result. Useful for formats not natively supported by browsers.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: Converted JPEG image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /api/media/{mediaId}/transcode:
    post:
      tags: [Transcode]
      summary: Enqueue a video transcode job
      description: >-
        Starts an H.264/AAC MP4 re-encode via ffmpeg. Returns 202 if a new job
        was created, 200 if an active job already exists for this media item.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '202':
          description: Transcode job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
        '200':
          description: Active job already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Enqueue failed

  /api/media/{mediaId}/transcode/stream:
    get:
      tags: [Transcode]
      summary: Stream the transcoded MP4 output
      description: Only available when a successful transcode job exists for this media item.
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: Transcoded MP4 stream
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content (Range request)
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Scans ────────────────────────────────────────────────────────────────

  /api/scans:
    post:
      tags: [Scans]
      summary: Trigger manual scan
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRequest'
      responses:
        '202':
          description: Scan job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanJob'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Scans]
      summary: List recent scan jobs (last 100)
      responses:
        '200':
          description: Scan job list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScanJob'

  /api/scans/active:
    get:
      tags: [Scans]
      summary: Get currently active (running or queued) scan job
      responses:
        '200':
          description: Active scan job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanJob'
        '404':
          description: No active scan job

  /api/scans/{scanId}:
    get:
      tags: [Scans]
      summary: Get scan job by ID
      parameters:
        - $ref: '#/components/parameters/ScanId'
      responses:
        '200':
          description: Scan job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanJob'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Transcode Jobs ───────────────────────────────────────────────────────

  /api/transcode-jobs/{jobId}:
    get:
      tags: [Transcode]
      summary: Get transcode job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transcode job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscodeJob'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Map ──────────────────────────────────────────────────────────────────

  /api/map/clusters:
    get:
      tags: [Map]
      summary: Get GPS clusters for map rendering
      parameters:
        - name: zoom
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 22
            default: 5
        - name: bbox
          in: query
          required: false
          schema:
            type: string
          description: "Bounding box: west,south,east,north (e.g. -10.5,47.0,15.0,55.0)"
        - name: album_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Filter to media within this album subtree
      responses:
        '200':
          description: GeoJSON FeatureCollection of GPS clusters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoJSONFeatureCollection'

  /api/map/style:
    get:
      tags: [Map]
      summary: Proxied MapLibre GL style JSON (openfreemap.org)
      description: Rewrites all tile/glyph/sprite URLs to /api/map/proxy/... so browsers never call openfreemap.org directly. Cached 10 minutes.
      responses:
        '200':
          description: MapLibre style JSON
          content:
            application/json:
              schema:
                type: object
        '502':
          description: Upstream unavailable

  /api/map/proxy/{path}:
    get:
      tags: [Map]
      summary: Proxy tile, glyph, and sprite requests to openfreemap.org
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proxied response
        '502':
          description: Upstream unavailable

  # ─── Admin ────────────────────────────────────────────────────────────────

  /api/reset_thumbs:
    get:
      tags: [Admin]
      summary: Delete thumbnail cache and reset thumb_ready flags
      description: Deletes all files in thumbnails.cacheDir and resets thumb_ready=0 for all media items. Background warmer will regenerate thumbnails.
      responses:
        '200':
          description: Reset completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  mediaReset:
                    type: integer
        '500':
          description: Reset failed (server misconfiguration or filesystem error)

  # ─── Health ───────────────────────────────────────────────────────────────

  /api/health:
    get:
      tags: [Health]
      summary: Service health with component availability
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  parameters:
    AlbumId:
      name: albumId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    MediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ScanId:
      name: scanId
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Invalid parameter or request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict (e.g. scan already running)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    AlbumResponse:
      type: object
      properties:
        album:
          $ref: '#/components/schemas/Album'
        breadcrumbs:
          type: array
          items:
            $ref: '#/components/schemas/Breadcrumb'
        childAlbums:
          type: array
          items:
            $ref: '#/components/schemas/AlbumTile'
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
      required: [album, breadcrumbs, childAlbums, media, page]

    Album:
      type: object
      properties:
        id:
          type: integer
          format: int64
        relativePath:
          type: string
        name:
          type: string
        parentAlbumId:
          type: integer
          format: int64
          nullable: true
        mediaCountDirect:
          type: integer
        mediaCountRecursive:
          type: integer
        childAlbumCount:
          type: integer
      required: [id, relativePath, name, mediaCountDirect, mediaCountRecursive, childAlbumCount]

    AlbumTile:
      allOf:
        - $ref: '#/components/schemas/Album'
        - type: object
          properties:
            coverMediaId:
              type: integer
              format: int64
              nullable: true
            coverThumbnailUrl:
              type: string
              nullable: true

    Breadcrumb:
      type: object
      properties:
        albumId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        relativePath:
          type: string
      required: [name, relativePath]

    MediaSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        albumId:
          type: integer
          format: int64
        filename:
          type: string
        type:
          type: string
          enum: [image, video]
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        durationMs:
          type: integer
          nullable: true
        sizeBytes:
          type: integer
          format: int64
        captureDate:
          type: string
          format: date-time
          nullable: true
        thumbnailUrl:
          type: string
      required: [id, albumId, filename, type, sizeBytes, thumbnailUrl]

    MediaMetadata:
      allOf:
        - $ref: '#/components/schemas/MediaSummary'
        - type: object
          properties:
            extension:
              type: string
            mimeType:
              type: string
            cameraModel:
              type: string
              nullable: true
            lensModel:
              type: string
              nullable: true
            gpsLat:
              type: number
              format: double
              nullable: true
            gpsLon:
              type: number
              format: double
              nullable: true
            orientation:
              type: integer
              nullable: true
            warningLargeMedia:
              type: boolean
          required: [extension, mimeType, warningLargeMedia]

    ScanRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [full, quick, orphan]
          default: quick
        albumPath:
          type: string
          description: Optional relative path to restrict scan to a subtree

    ScanJob:
      type: object
      properties:
        id:
          type: string
        mode:
          type: string
          enum: [full, quick, orphan]
        status:
          type: string
          enum: [queued, running, success, failed]
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        scannedFiles:
          type: integer
        indexedFiles:
          type: integer
        skippedFiles:
          type: integer
        errorCount:
          type: integer
        fallbackToFull:
          type: boolean
      required: [id, mode, status, scannedFiles, indexedFiles, skippedFiles, errorCount, fallbackToFull]

    TranscodeJob:
      type: object
      properties:
        jobId:
          type: string
        mediaId:
          type: integer
          format: int64
        status:
          type: string
          enum: [queued, running, success, failed]
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
      required: [jobId, mediaId, status, createdAt]

    GeoJSONFeatureCollection:
      type: object
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: '#/components/schemas/GeoJSONFeature'
      required: [type, features]

    GeoJSONFeature:
      type: object
      properties:
        type:
          type: string
          enum: [Feature]
        geometry:
          type: object
          properties:
            type:
              type: string
              enum: [Point]
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
              description: "[longitude, latitude]"
        properties:
          type: object
          properties:
            count:
              type: integer
            ids:
              type: array
              items:
                type: integer
                format: int64
            thumbnailId:
              type: integer
              format: int64

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        mediaRootAvailable:
          type: boolean
        databaseAvailable:
          type: boolean
        uptimeSeconds:
          type: integer
      required: [status, mediaRootAvailable, databaseAvailable, uptimeSeconds]

    PageInfo:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 500
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
        hasPrev:
          type: boolean
      required: [page, pageSize, totalItems, totalPages, hasNext, hasPrev]

    ErrorResponse:
      type: object
      description: >-
        Uniform error envelope. Known codes: NOT_FOUND, INVALID_PARAM,
        SCAN_ALREADY_RUNNING, RANGE_NOT_SATISFIABLE, INTERNAL_ERROR.
      properties:
        code:
          type: string
        message:
          type: string
      required: [code, message]
