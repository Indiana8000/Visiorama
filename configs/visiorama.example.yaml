server:
  host: 0.0.0.0
  port: 8080
  memLimitMiB: 0  # 0 = auto (90% of cgroup/physical RAM); >0 sets a hard limit in MiB

library:
  rootPath: /mnt/photos
  includeEmptyAlbums: true

scan:
  defaultMode: quick
  quickFallbackToFull: true
  ignoreDirMtime: false
  maxWorkers: 0  # 0 = auto (min of CPU count and RAM/512MiB); >0 caps the auto value

filtering:
  excludePatterns: [".*", "@eaDir", "Thumbs.db", "#recycle"]
  allowedImageExtensions: ["jpg", "jpeg", "png", "webp", "gif", "heic", "tif", "tiff", "avif"]
  allowedVideoExtensions: ["mp4", "mkv", "mov", "webm", "avi", "m4v"]
  enableMimeSniff: true

thumbnails:
  cacheDir: /var/lib/visiorama/thumbs
  sizes: [320, 640]
  aspectRatioW: 4
  aspectRatioH: 3

transcode:
  cacheDir: /var/lib/visiorama/transcodes  # directory for transcoded video files
  ttlHours: 48                             # delete transcoded files after this many hours (0 = use default 48)
  imageMaxDim: 2400                        # max dimension (px) for on-demand image conversion to JPEG

limits:
  largeMediaWarningBytes: 104857600

database:
  sqlitePath: /var/lib/visiorama/index.db
